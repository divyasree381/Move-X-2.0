services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: movex-postgres
    environment:
      POSTGRES_DB: movex
      POSTGRES_USER: movex
      POSTGRES_PASSWORD: movex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: movex-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: movex-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: movex-dev-search-key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  mailpit:
    image: axllent/mailpit:latest
    container_name: movex-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  sms-mock:
    image: mockserver/mockserver:5.15.0
    container_name: movex-sms-mock
    environment:
      MOCKSERVER_LOG_LEVEL: WARN
    ports:
      - "1080:1080"

volumes:
  postgres_data:
  redis_data:
  meili_data:
